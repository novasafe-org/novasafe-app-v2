# Gitleaks → Trivy → build → push → deploy (single pipeline)
#
# Env on VPS: /opt/novasafe-deployment/platform/app/.env

name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  pipeline:
    uses: novasafe-org/novasafe-deployment/.github/workflows/docker-ci.yml@master
    with:
      app_title: NovaSafe App
      repository_name: novasafe-app-v2
      deploy_service: app
    secrets: inherit
